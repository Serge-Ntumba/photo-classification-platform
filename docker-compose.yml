services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - public
      - internal

  web:
    build:
      context: .
      dockerfile: services/main/Dockerfile
      target: test
      args:
        INSTALL_EXTRAS: main,dev
    env_file:
      - path: .env.example
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    networks:
      - internal

  worker:
    build:
      context: .
      dockerfile: services/main/Dockerfile
    env_file:
      - path: .env.example
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      classifier:
        condition: service_started
    command: celery -A config worker --loglevel=INFO
    networks:
      - internal

  classifier:
    build:
      context: .
      dockerfile: services/classifier/Dockerfile
    environment:
      CLASSIFIER_PROVIDER: ${CLASSIFIER_PROVIDER:-rule_based}
      PHOTO_MAX_UPLOAD_BYTES: ${PHOTO_MAX_UPLOAD_BYTES:-5242880}
      PHOTO_MIN_WIDTH: ${PHOTO_MIN_WIDTH:-300}
      PHOTO_MIN_HEIGHT: ${PHOTO_MIN_HEIGHT:-300}
      PHOTO_MAX_WIDTH: ${PHOTO_MAX_WIDTH:-5000}
      PHOTO_MAX_HEIGHT: ${PHOTO_MAX_HEIGHT:-5000}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-photo_classification}
      POSTGRES_USER: ${POSTGRES_USER:-photo_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-photo_app_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-photo_app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-photo_app_password}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-photo_app}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio:
    image: quay.io/minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin-password}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-photo-submissions}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin-password}
    entrypoint: >
      /bin/sh -c "
      mc alias set local $${S3_ENDPOINT_URL} $${S3_ACCESS_KEY_ID} $${S3_SECRET_ACCESS_KEY};
      mc mb --ignore-existing local/$${S3_BUCKET_NAME};
      mc anonymous set none local/$${S3_BUCKET_NAME};
      "
    networks:
      - internal

networks:
  public:
  internal:
    internal: true

volumes:
  postgres-data:
  rabbitmq-data:
  minio-data:
