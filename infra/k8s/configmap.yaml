apiVersion: v1
kind: ConfigMap
metadata:
  name: main-config
  namespace: photo-classification
data:
  DJANGO_SETTINGS_MODULE: config.settings
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: "photo-classification.example.com,localhost,web,nginx"
  DJANGO_CSRF_TRUSTED_ORIGINS: "https://photo-classification.example.com"
  DJANGO_TIME_ZONE: UTC
  POSTGRES_DB: photo_classification
  POSTGRES_USER: photo_app
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  CELERY_RESULT_BACKEND: rpc://
  CELERY_TASK_ALWAYS_EAGER: "false"
  CELERY_TASK_EAGER_PROPAGATES: "true"
  S3_ENDPOINT_URL: http://minio:9000
  S3_BUCKET_NAME: photo-submissions
  S3_REGION_NAME: us-east-1
  S3_USE_SSL: "false"
  CLASSIFIER_URL: http://classifier:8001
  PHOTO_MAX_UPLOAD_BYTES: "5242880"
  PHOTO_MIN_WIDTH: "300"
  PHOTO_MIN_HEIGHT: "300"
  PHOTO_MAX_WIDTH: "5000"
  PHOTO_MAX_HEIGHT: "5000"
  CLASSIFIER_TIMEOUT_SECONDS: "5"
  CLASSIFIER_MAX_RETRIES: "3"
  RABBITMQ_PUBLISH_MAX_ATTEMPTS: "3"
  RETRY_BACKOFF_BASE_SECONDS: "2"
  RETRY_BACKOFF_CAP_SECONDS: "60"
  RETRY_BACKOFF_JITTER: "true"
  WORKER_HEALTH_INCLUDE_QUEUE_DEPTH: "false"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: classifier-config
  namespace: photo-classification
data:
  CLASSIFIER_PROVIDER: rule_based
  PHOTO_MAX_UPLOAD_BYTES: "5242880"
  PHOTO_MIN_WIDTH: "300"
  PHOTO_MIN_HEIGHT: "300"
  PHOTO_MAX_WIDTH: "5000"
  PHOTO_MAX_HEIGHT: "5000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: photo-classification
data:
  default.conf: |
    client_max_body_size 6m;

    upstream django_app {
      server web:8000;
    }

    server {
      listen 80;
      root /usr/share/nginx/html;
      index index.html;

      location = /health {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
      }

      location ^~ /health/ {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
      }

      location ^~ /api/docs/ {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
      }

      location ^~ /api/ {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
      }

      location = /admin {
        return 301 /admin/;
      }

      location ^~ /static/ {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
      }

      location ^~ /admin/ {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
