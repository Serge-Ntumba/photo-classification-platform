apiVersion: apps/v1
kind: Deployment
metadata:
  name: classifier
  namespace: photo-classification
spec:
  replicas: 2
  selector:
    matchLabels:
      app: classifier
  template:
    metadata:
      labels:
        app: classifier
    spec:
      containers:
        - name: classifier
          image: ghcr.io/example/photo-classification-classifier:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001"]
          env:
            - name: CLASSIFIER_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: classifier-config
                  key: CLASSIFIER_PROVIDER
            - name: PHOTO_MAX_UPLOAD_BYTES
              valueFrom:
                configMapKeyRef:
                  name: classifier-config
                  key: PHOTO_MAX_UPLOAD_BYTES
            - name: PHOTO_MIN_WIDTH
              valueFrom:
                configMapKeyRef:
                  name: classifier-config
                  key: PHOTO_MIN_WIDTH
            - name: PHOTO_MIN_HEIGHT
              valueFrom:
                configMapKeyRef:
                  name: classifier-config
                  key: PHOTO_MIN_HEIGHT
            - name: PHOTO_MAX_WIDTH
              valueFrom:
                configMapKeyRef:
                  name: classifier-config
                  key: PHOTO_MAX_WIDTH
            - name: PHOTO_MAX_HEIGHT
              valueFrom:
                configMapKeyRef:
                  name: classifier-config
                  key: PHOTO_MAX_HEIGHT
          ports:
            - name: http
              containerPort: 8001
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
