apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: photo-classification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-alpine
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: photo_app
            - name: RABBITMQ_DEFAULT_VHOST
              value: photo_app
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_DEFAULT_PASS
          ports:
            - name: amqp
              containerPort: 5672
