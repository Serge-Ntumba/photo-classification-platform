apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: photo-classification
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/example/photo-classification-web:latest
          imagePullPolicy: IfNotPresent
          command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000"]
          envFrom:
            - configMapRef:
                name: main-config
            - secretRef:
                name: main-secret
          env:
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: main-secret
                  key: RABBITMQ_DEFAULT_PASS
            - name: CELERY_BROKER_URL
              value: amqp://photo_app:$(RABBITMQ_DEFAULT_PASS)@rabbitmq:5672/photo_app
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
