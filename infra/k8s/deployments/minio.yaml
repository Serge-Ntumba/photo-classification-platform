apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: photo-classification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          command: ["minio", "server", "/data"]
          envFrom:
            - secretRef:
                name: minio-secret
          ports:
            - name: s3
              containerPort: 9000
          volumeMounts:
            - name: minio-data
              mountPath: /data
      volumes:
        - name: minio-data
          emptyDir: {}
